<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - {{ role }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <h1>📊 Your Feedback</h1>
        <p class="subtitle">Role: {{ role }}</p>

        <div class="card">
            <h3>❓ Question Asked</h3>
            <p>{{ question }}</p>
        </div>

        <div class="card">
            <h3>💬 Your Answer</h3>
            <p>{{ answer }}</p>
        </div>

        <div class="card evaluation">
            <h3>🤖 AI Evaluation</h3>
            <pre>{{ evaluation }}</pre>
        </div>

        <div class="actions">
            <a href="/interview" class="btn">← Try Another Question</a>
            <a href="/" class="btn btn-outline">🔄 Start Over</a>
            <a href="/history" class="btn btn-outline">📊 View History</a>
        </div>

    </div>

</body>
</html>
